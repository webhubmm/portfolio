# Deploy Next.js app to server (webhubasia.com) on push to main
name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual run from Actions tab

env:
  SERVER_HOST: "157.230.35.120"
  APP_DIR: "/var/www/webhubasia"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart webhubasia --update-env || pm2 start npm --name webhubasia -- start
            pm2 save
